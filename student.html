<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生作品集 | 2026 AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        /* 此頁面專屬樣式，延伸自 style.css 的藏青/金色主題 */
        .stats-row { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .stat-card {
            flex: 1; min-width: 160px;
            background: #fffdf8; border-radius: 15px; padding: 1.5rem; text-align: center;
            box-shadow: 0 6px 18px var(--shadow-navy);
        }
        .stat-number { font-size: 2.2rem; font-weight: 700; color: var(--navy-deep); }
        .stat-label { color: var(--ink-soft); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

        .search-box { position: relative; margin-bottom: 1.5rem; }
        .search-input {
            border: 2px solid var(--cream-deep); border-radius: 50px;
            padding: 14px 50px 14px 20px; font-size: 1.05rem; width: 100%;
            transition: all 0.3s ease;
        }
        .search-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(202,164,164,0.2); outline: none; }
        .search-icon { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--gold); }

        .refresh-bar { display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 2rem; }
        .refresh-btn {
            display: inline-flex; align-items: center; gap: 10px;
            background: var(--gradient-navy); color: #fffdf8; border: none;
            padding: 12px 28px; border-radius: 50px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px var(--shadow-navy);
        }
        .refresh-btn:hover { transform: translateY(-2px) scale(1.03); color: var(--gold-light); }
        .refresh-btn.loading { pointer-events: none; opacity: 0.85; }
        .refresh-btn.loading .fa-sync-alt { animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .refresh-status { font-size: 0.9rem; color: var(--ink-soft); min-height: 22px; }
        .refresh-status.success { color: #2e7d4f; font-weight: 600; }
        .refresh-status.error   { color: #c0392b; font-weight: 600; }

        .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .student-card {
            background: #fffdf8; border-radius: 15px; padding: 1.8rem; text-align: center;
            box-shadow: 0 6px 20px var(--shadow-navy); transition: all 0.3s ease;
            border: 2px solid transparent; position: relative; overflow: hidden;
            opacity: 0; transform: translateY(30px);
        }
        .student-card.visible { opacity: 1; transform: translateY(0); }
        .student-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--navy-mid), var(--gold));
        }
        .student-card:hover { transform: translateY(-8px); box-shadow: 0 14px 32px rgba(61,47,82,0.25); border-color: var(--gold); }
        .student-photo {
            width: 96px; height: 96px; border-radius: 50%; object-fit: cover; margin: 0 auto 1.2rem;
            border: 4px solid var(--cream-deep); box-shadow: 0 4px 14px var(--shadow-navy); transition: all 0.3s ease;
        }
        .student-card:hover .student-photo { border-color: var(--gold); transform: scale(1.05); }
        .student-name { font-size: 1.2rem; font-weight: 700; color: var(--navy-deep); margin-bottom: 0.4rem; }
        .student-program {
            color: var(--ink-soft); font-size: 0.9rem; margin-bottom: 1rem;
            background: var(--cream-deep); padding: 4px 14px; border-radius: 20px; display: inline-block; font-weight: 500;
        }
        .website-link {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--gradient-navy); color: #fffdf8; text-decoration: none;
            padding: 10px 20px; border-radius: 25px; font-weight: 500; transition: all 0.3s ease;
        }
        .website-link:hover { transform: scale(1.05); color: var(--gold-light); }
        .no-results { text-align: center; padding: 60px 20px; color: var(--ink-soft); }
        .no-results i { font-size: 4rem; color: var(--cream-deep); margin-bottom: 20px; }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html#home">2026 AI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html#home">首頁</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#about">關於我</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#projects">我的專案</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#contact">聯絡我</a></li>
                    <li class="nav-item"><a class="nav-link" href="homework.html">交作業</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <section class="project-header">
        <div class="container">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> 返回首頁
            </a>
            <h1 class="project-title mt-3"><i class="fas fa-graduation-cap me-2"></i>學生作品集</h1>
            <p class="project-subtitle">Student Personal Website Portfolio — Summer 2026</p>
        </div>
    </section>

    <!-- Content -->
    <section class="section">
        <div class="container">

            <div class="stats-row">
                <div class="stat-card"><div class="stat-number" id="totalStudents">0</div><div class="stat-label">Total Students</div></div>
                <div class="stat-card"><div class="stat-number" id="displayedCount">0</div><div class="stat-label">Currently Shown</div></div>
            </div>

            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜尋學生姓名或學號 Search name or ID...">
                <i class="fas fa-search search-icon"></i>
            </div>

            <div class="refresh-bar">
                <button class="refresh-btn" id="refreshBtn" onclick="fetchFromGoogleSheet()">
                    <i class="fas fa-sync-alt"></i> 從 Google Sheet 重新載入
                </button>
                <div class="refresh-status" id="refreshStatus"></div>
            </div>

            <div class="student-grid" id="studentGrid"></div>

            <div class="no-results" id="noResults" style="display: none;">
                <i class="fas fa-search"></i>
                <h3>找不到符合條件的學生</h3>
                <p>請嘗試不同的搜尋關鍵字</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p><i class="fas fa-graduation-cap me-1"></i> Summer 2026 | Total <span id="footerTotal">0</span> Students | <span id="footerActive">0</span> Websites Active</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        const FALLBACK_PHOTO = "https://ntust2026.github.io/pic/1.jpg";
        const SHEET_ID = "1-HVb7uFlG9em6EAdYLnLOZLLDiWH4hUECK42lafnVys";
        let students = [];
        let filteredStudents = [];

        function fetchFromGoogleSheet() {
            const btn = document.getElementById('refreshBtn');
            const status = document.getElementById('refreshStatus');

            btn.classList.add('loading');
            status.className = 'refresh-status';
            status.textContent = '⏳ 排除重複並從 Google Sheet 讀取資料...';

            const oldScript = document.getElementById('gsheet-jsonp');
            if (oldScript) oldScript.remove();

            window.__sheetCallback = function(response) {
                try {
                    const rows = response.table.rows;

                    // 使用 Map 處理重複資料，Key 為學號
                    // 後出現的資料會覆蓋舊的，保留「最近一筆」
                    const studentMap = new Map();

                    for (let i = 0; i < rows.length; i++) {
                        const cells = rows[i].c;
                        const name      = cells[1] ? (cells[1].v || '').toString().trim() : '';
                        const studentId = cells[2] ? (cells[2].v || '').toString().trim() : '';
                        const website   = cells[3] ? (cells[3].v || '').toString().trim() : '';

                        if (name && studentId && name !== "姓名") {
                            const baseUrl = website.replace(/\/+$/, '');
                            const photo   = baseUrl + '/mypic.jpg';

                            studentMap.set(studentId, { name, studentId, website, photo });
                        }
                    }

                    // 轉回陣列格式
                    students = Array.from(studentMap.values());
                    filteredStudents = [...students];
                    document.getElementById('searchInput').value = '';
                    updateCounts();
                    renderStudents(students);
                    animateCards();

                    const now = new Date().toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
                    status.className = 'refresh-status success';
                    status.textContent = '✅ 成功載入 ' + students.length + ' 筆資料（已排除重複，時間：' + now + '）';
                } catch (err) {
                    console.error(err);
                    status.className = 'refresh-status error';
                    status.textContent = '❌ 解析資料失敗：' + err.message;
                } finally {
                    btn.classList.remove('loading');
                }
            };

            const script = document.createElement('script');
            script.id = 'gsheet-jsonp';
            script.src = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID
                       + '/gviz/tq?tqx=out:json;responseHandler:__sheetCallback'
                       + '&_=' + Date.now();

            script.onerror = function() {
                status.className = 'refresh-status error';
                status.textContent = '❌ 無法連線到 Google Sheets，請檢查網路連線或分享權限';
                btn.classList.remove('loading');
            };

            document.body.appendChild(script);
        }

        function renderStudents(list) {
            const grid = document.getElementById('studentGrid');
            const noRes = document.getElementById('noResults');
            if (list.length === 0) {
                grid.style.display = 'none'; noRes.style.display = 'block';
            } else {
                grid.style.display = 'grid'; noRes.style.display = 'none';
                grid.innerHTML = list.map(function(s) {
                    return '<div class="student-card">'
                        + '<img src="' + s.photo + '" alt="' + s.name + '" class="student-photo"'
                        + ' onerror="this.onerror=null; this.src=\'' + FALLBACK_PHOTO + '\';">'
                        + '<div class="student-name">' + s.name + '</div>'
                        + '<div class="student-program">學號: ' + s.studentId + '</div>'
                        + '<a href="' + s.website + '" target="_blank" class="website-link">'
                        + '<i class="fas fa-globe"></i> Visit Website</a>'
                        + '</div>';
                }).join('');
            }
            document.getElementById('displayedCount').textContent = list.length;
        }

        function updateCounts() {
            var c = students.length;
            document.getElementById('totalStudents').textContent = c;
            document.getElementById('footerTotal').textContent = c;
            document.getElementById('footerActive').textContent = c;
        }

        function filterStudents() {
            var term = document.getElementById('searchInput').value.toLowerCase();
            filteredStudents = students.filter(function(s) {
                return s.name.toLowerCase().indexOf(term) !== -1
                    || s.studentId.toLowerCase().indexOf(term) !== -1;
            });
            renderStudents(filteredStudents);
        }

        function animateCards() {
            var obs = new IntersectionObserver(function(entries) {
                entries.forEach(function(e) {
                    if (e.isIntersecting) { e.target.classList.add('visible'); }
                });
            });
            setTimeout(function() {
                document.querySelectorAll('.student-card').forEach(function(c) {
                    obs.observe(c);
                });
            }, 100);
        }

        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('searchInput').addEventListener('input', filterStudents);
            fetchFromGoogleSheet();
        });
    </script>
</body>
</html>
